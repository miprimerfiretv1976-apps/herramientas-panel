<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herramientas — Panel de control</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d26; --surface2: #22263a; --border: #2e3347;
    --text: #e8eaf0; --muted: #7a8099; --accent: #4f8ef7;
    --ok: #3dd68c; --warn: #f5a623; --danger: #f04a4a; --pending: #a78bfa;
    --mono: 'Courier New', monospace; --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 8px; }
  .logo { font-size: 15px; font-weight: 600; color: var(--text); }
  .logo span { color: var(--accent); }
  .ver-badge { font-size: 11px; font-family: var(--mono); color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; }
  .badge-count { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 11px; padding: 2px 8px; border-radius: 99px; font-family: var(--mono); }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .last-update { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .stats-bar { display: flex; gap: 1.5rem; padding: .6rem 1.5rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .stat { font-size: 12px; color: var(--muted); }
  .stat strong { color: var(--text); font-family: var(--mono); }
  .filters-bar { padding: .85rem 1.5rem; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .filt { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 99px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px; }
  .filt:hover, .filt.active { color: var(--text); border-color: var(--accent); background: rgba(79,142,247,.1); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .search-wrap { margin-left: auto; }
  .search-wrap input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 8px; font-size: 12px; outline: none; width: 180px; }
  .search-wrap input:focus { border-color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; padding: 1.25rem 1.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 8px; }
  .card.estado-trabajando { border-left: 3px solid var(--accent); }
  .card.estado-correcto   { border-left: 3px solid var(--ok); }
  .card.estado-esperar    { border-left: 3px solid var(--warn); }
  .card.estado-pendiente  { border-left: 3px solid var(--pending); }
  .card.estado-descartada { border-left: 3px solid var(--danger); opacity:.6; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-name { font-size: 13px; font-weight: 600; }
  .card-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .badge-estado { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; text-transform: uppercase; }
  .b-correcto { background: rgba(61,214,140,.15); color: var(--ok); }
  .b-trabajando { background: rgba(79,142,247,.15); color: var(--accent); }
  .b-esperar { background: rgba(245,166,35,.15); color: var(--warn); }
  .b-pendiente { background: rgba(167,139,250,.15); color: var(--pending); }
  .b-descartada { background: rgba(240,74,74,.15); color: var(--danger); }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tag { font-size: 11px; font-family: var(--mono); background: var(--surface2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; color: var(--muted); }
  .tag-icono { color: var(--accent); border-color: rgba(79,142,247,.3); }
  .meta-email { font-size: 11px; color: var(--muted); }
  .link-open { font-size: 11px; color: var(--accent); text-decoration: none; margin-left: auto; }
  .card-deploy { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .estado-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; outline: none; width: 100%; }
  .estado-select:focus { border-color: var(--accent); }
  .obs-section { border-top: 1px solid var(--border); padding-top: 8px; }
  .obs-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .obs-text { font-size: 12px; color: #a0a8c0; line-height: 1.5; }
  .obs-empty { font-style: italic; color: var(--border); }
  .obs-add { display: flex; gap: 6px; margin-top: 6px; }
  .obs-add input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 9px; border-radius: 6px; font-size: 12px; outline: none; }
  .obs-add input:focus { border-color: var(--accent); }
  .obs-add button { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; }
  .obs-add button:hover { border-color: var(--accent); color: var(--accent); }
  .btn-delete { background: transparent; border: 1px solid var(--border); color: var(--danger); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; width: 100%; margin-top: 4px; }
  .btn-delete:hover { background: rgba(240,74,74,.1); border-color: var(--danger); }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--muted); font-size: 13px; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transform: translateY(8px); transition: all .2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.ok { border-color: var(--ok); color: var(--ok); }
  .toast.err { border-color: var(--danger); color: var(--danger); }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: 300px; }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--danger); }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 1rem; line-height: 1.5; }
  .modal input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 20px; outline: none; letter-spacing: 6px; text-align: center; margin-bottom: 8px; }
  .modal input:focus { border-color: var(--danger); }
  .modal-error { font-size: 12px; color: var(--danger); text-align: center; margin-bottom: 8px; display: none; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 13px; border: 1px solid var(--border); }
  .btn-cancel { background: transparent; color: var(--muted); }
  .btn-confirm { background: rgba(240,74,74,.15); color: var(--danger); border-color: rgba(240,74,74,.4) !important; }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; padding: .75rem; }
    .search-wrap { margin-left: 0; width: 100%; }
    .search-wrap input { width: 100%; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">🛠 <span>Herramientas</span></span>
    <span class="ver-badge">v12</span>
    <span class="badge-count" id="badge-count">— apps</span>
  </div>
  <div class="topbar-right">
    <span class="last-update" id="last-update">sin datos</span>
    <button class="refresh-btn" onclick="loadSheet()">↺ Actualizar</button>
  </div>
</div>

<div id="app-section">
  <div class="stats-bar" id="stats-bar"></div>
  <div class="filters-bar">
    <button class="filt active" onclick="setFilter('all',this)">Todas</button>
    <button class="filt" onclick="setFilter('trabajando',this)"><span class="dot" style="background:var(--accent)"></span>Trabajando</button>
    <button class="filt" onclick="setFilter('correcto',this)"><span class="dot" style="background:var(--ok)"></span>Correcto</button>
    <button class="filt" onclick="setFilter('esperar',this)"><span class="dot" style="background:var(--warn)"></span>Esperar</button>
    <button class="filt" onclick="setFilter('pendiente',this)"><span class="dot" style="background:var(--pending)"></span>Pendiente</button>
    <button class="filt" onclick="setFilter('descartada',this)"><span class="dot" style="background:var(--danger)"></span>Descartadas</button>
    <div class="search-wrap"><input type="text" id="search-input" placeholder="Buscar..." oninput="renderCards()" /></div>
  </div>
  <div class="grid" id="cards-grid"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal-eliminar">
  <div class="modal">
    <h3>🗑 Eliminar herramienta</h3>
    <p id="modal-nombre-text">¿Eliminar esta herramienta?</p>
    <input type="password" id="modal-pin" placeholder="PIN" maxlength="4" onkeydown="if(event.key==='Enter')confirmarPin()" />
    <div class="modal-error" id="modal-error">PIN incorrecto</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmarPin()">Eliminar</button>
    </div>
  </div>
</div>

<script>
const SHEET_ID   = '10irlDgBgsMVTTI4C1l-otFsNjhhWJr1otr4X3JXKT00';
const SHEET_NAME = 'HERRAMIENTAS';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZ2ZVMOXAVVAxCPmtGE8q_yQT6mQpTWcf-X0IrpjI7Tcyq1ub3xZCoFO3gKcvebKR3/exec';

let tools = [];
let filter = 'all';
let pendingDeleteIdx = null;

async function loadSheet() {
  document.getElementById('cards-grid').innerHTML = '<div class="empty-state">Cargando…</div>';
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    tools = json.table.rows
      .filter(r => r.c[0]?.v)
      .map(r => ({
        nombre:        String(r.c[0]?.v  || ''),
        url:           String(r.c[1]?.v  || ''),
        icono:         String(r.c[2]?.v  || ''),
        descripcion:   String(r.c[3]?.v  || ''),
        cod:           String(r.c[6]?.v  || ''),
        online:        String(r.c[7]?.v  || ''),
        vuelve:        String(r.c[9]?.v  || ''),
        estado:        String(r.c[10]?.v || '').toLowerCase().trim(),
        cuenta:        String(r.c[11]?.v || ''),
        observaciones: String(r.c[12]?.v || ''),
      }));
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('es-AR');
    document.getElementById('badge-count').textContent = tools.length + ' apps';
    updateStats();
    renderCards();
  } catch(e) {
    document.getElementById('cards-grid').innerHTML = '<div class="empty-state">❌ No se pudo leer la Sheet.</div>';
  }
}

function updateStats() {
  const c = {trabajando:0,correcto:0,esperar:0,pendiente:0,descartada:0};
  tools.forEach(t => { if(c[t.estado]!==undefined) c[t.estado]++; });
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><strong>${tools.length}</strong> total</div>
    <div class="stat" style="color:var(--accent)"><strong>${c.trabajando}</strong> en trabajo</div>
    <div class="stat" style="color:var(--ok)"><strong>${c.correcto}</strong> correctas</div>
    <div class="stat" style="color:var(--warn)"><strong>${c.esperar}</strong> esperando</div>
    <div class="stat" style="color:var(--pending)"><strong>${c.pendiente}</strong> pendientes</div>
    <div class="stat" style="color:var(--danger)"><strong>${c.descartada}</strong> descartadas</div>`;
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

const badgeClass = e => ({correcto:'b-correcto',trabajando:'b-trabajando',esperar:'b-esperar',pendiente:'b-pendiente',descartada:'b-descartada'}[e]||'b-esperar');
const badgeLabel = e => ({correcto:'Correcto',trabajando:'Trabajando',esperar:'Esperar',pendiente:'Pendiente',descartada:'Descartada'}[e]||e||'—');

function renderCards() {
  const q = (document.getElementById('search-input')?.value||'').toLowerCase();
  const list = tools.filter(t => (filter==='all'||t.estado===filter) && (!q||t.nombre.toLowerCase().includes(q)||t.descripcion.toLowerCase().includes(q)||t.icono.toLowerCase().includes(q)));
  const grid = document.getElementById('cards-grid');
  if (!list.length) { grid.innerHTML = '<div class="empty-state">No hay herramientas en esta categoría.</div>'; return; }
  grid.innerHTML = list.map(t => {
    const idx = tools.indexOf(t);
    const ec = 'estado-'+(t.estado||'esperar');
    const obs = t.observaciones ? `<div class="obs-text" id="obs-${idx}">${esc(t.observaciones)}</div>` : `<div class="obs-text obs-empty" id="obs-${idx}">Sin observaciones</div>`;
    const sel = ['trabajando','correcto','esperar','pendiente','descartada'].map(v=>`<option value="${v}"${t.estado===v?' selected':''}>${{trabajando:'🔵 Trabajando',correcto:'🟢 Correcto',esperar:'🟡 Esperar',pendiente:'🟣 Pendiente',descartada:'🔴 Descartada'}[v]}</option>`).join('');
    return `<div class="card ${ec}" id="card-${idx}">
      <div class="card-top">
        <div><div class="card-name">${esc(t.nombre)}</div><div class="card-desc">${esc(t.descripcion)}</div></div>
        <span class="badge-estado ${badgeClass(t.estado)}">${badgeLabel(t.estado)}</span>
      </div>
      <div class="card-meta">
        ${t.icono?`<span class="tag tag-icono">${esc(t.icono)}</span>`:''}
        ${t.cod?`<span class="tag">COD: ${esc(t.cod)}</span>`:''}
        ${t.online&&t.online!=='null'?`<span class="tag">online: ${esc(t.online)}</span>`:''}
        ${t.url&&t.url!=='null'?`<a class="link-open" href="${esc(t.url)}" target="_blank">↗ Abrir</a>`:''}
      </div>
      ${t.cuenta&&t.cuenta!=='null'?`<div class="meta-email">✉ ${esc(t.cuenta)}</div>`:''}
      ${t.vuelve&&t.vuelve!=='null'?`<div class="card-deploy">⏰ Vuelve: ${esc(t.vuelve)}</div>`:''}
      <select class="estado-select" onchange="cambiarEstado(${idx},this.value)">${sel}</select>
      <div class="obs-section">
        <div class="obs-label">Observaciones</div>
        ${obs}
        <div class="obs-add">
          <input type="text" id="obs-inp-${idx}" placeholder="Agregar nota…" onkeydown="if(event.key==='Enter')addObs(${idx})"/>
          <button onclick="addObs(${idx})">+ Guardar</button>
        </div>
      </div>
      <button class="btn-delete" onclick="abrirModalEliminar(${idx})">🗑 Eliminar herramienta</button>
    </div>`;
  }).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function callScript(payload) {
  const url = SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify(payload));
  try { await fetch(url, { mode: 'no-cors' }); } catch(e) {}
}

async function addObs(idx) {
  const inp = document.getElementById(`obs-inp-${idx}`);
  const val = inp.value.trim();
  if (!val) return;
  const btn = inp.nextElementSibling;
  btn.textContent = '…'; btn.disabled = true;
  await callScript({ action: 'addObs', nombre: tools[idx].nombre, obs: val });
  const ts = new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const nuevo = `[${ts}] ${val}`;
  tools[idx].observaciones = tools[idx].observaciones ? tools[idx].observaciones + ' · ' + nuevo : nuevo;
  const el = document.getElementById(`obs-${idx}`);
  if (el) { el.classList.remove('obs-empty'); el.textContent = tools[idx].observaciones; }
  inp.value = ''; btn.textContent = '✓'; btn.disabled = false;
  setTimeout(() => btn.textContent = '+ Guardar', 1800);
  showToast('Nota guardada ✓', 'ok');
}

async function cambiarEstado(idx, nuevoEstado) {
  if (!nuevoEstado) return;
  await callScript({ action: 'update', nombre: tools[idx].nombre, campo: 'estado', valor: nuevoEstado });
  tools[idx].estado = nuevoEstado;
  const card = document.getElementById(`card-${idx}`);
  if (card) {
    card.className = `card estado-${nuevoEstado}`;
    const badge = card.querySelector('.badge-estado');
    if (badge) { badge.className = `badge-estado ${badgeClass(nuevoEstado)}`; badge.textContent = badgeLabel(nuevoEstado); }
  }
  updateStats();
  showToast(`Estado → ${badgeLabel(nuevoEstado)} ✓`, 'ok');
}

function abrirModalEliminar(idx) {
  pendingDeleteIdx = idx;
  document.getElementById('modal-nombre-text').textContent = '¿Eliminar "' + tools[idx].nombre + '" de la Sheet?';
  document.getElementById('modal-pin').value = '';
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal-eliminar').classList.add('show');
  setTimeout(() => document.getElementById('modal-pin').focus(), 100);
}

function cerrarModal() {
  document.getElementById('modal-eliminar').classList.remove('show');
  pendingDeleteIdx = null;
}

function confirmarPin() {
  const pin = document.getElementById('modal-pin').value;
  if (pin !== '7749') {
    document.getElementById('modal-error').style.display = 'block';
    document.getElementById('modal-pin').value = '';
    return;
  }
  const idx = pendingDeleteIdx;
  const nombre = tools[idx].nombre;
  cerrarModal();
  // Abrir pestaña nueva para el DELETE — más confiable que fetch no-cors
  const url = SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify({ action: 'eliminar', nombre: nombre }));
  window.open(url, '_blank');
  // Actualizar panel local
  tools.splice(idx, 1);
  document.getElementById('badge-count').textContent = tools.length + ' apps';
  updateStats();
  renderCards();
  showToast('Eliminada ✓ — cerrá la pestaña', 'ok');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 2500);
}

loadSheet();
</script>
</body>
</html>
